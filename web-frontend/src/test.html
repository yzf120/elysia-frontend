<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试页面</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      .test-box {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        margin-bottom: 20px;
      }
      .success { color: green; }
      .error { color: red; }
    </style>
  </head>
  <body>
    <div class="test-box">
      <h1>🧪 Elysia 前端测试页面</h1>
      <p>如果你能看到这个页面，说明 Vite 服务器运行正常！</p>
    </div>

    <div class="test-box">
      <h2>✅ 测试项目</h2>
      <ul id="test-results">
        <li>正在检测...</li>
      </ul>
    </div>

    <div class="test-box">
      <h2>🔗 快速链接</h2>
      <ul>
        <li><a href="/">返回主页（角色选择）</a></li>
        <li><a href="/?role=admin">管理员登录</a></li>
        <li><a href="/?role=teacher">教师登录</a></li>
        <li><a href="/?role=student">学生登录</a></li>
      </ul>
    </div>

    <script type="module">
      const results = [];
      
      // 测试1: DOM 加载
      results.push({ name: 'DOM 加载', status: true });
      
      // 测试2: 模块导入
      try {
        const testImport = await import('./api/index.js');
        results.push({ name: 'API 模块导入', status: true });
      } catch (e) {
        results.push({ name: 'API 模块导入', status: false, error: e.message });
      }
      
      // 测试3: 后端连接
      try {
        const response = await fetch('http://localhost:8001/api');
        results.push({ name: '后端服务连接', status: response.ok });
      } catch (e) {
        results.push({ name: '后端服务连接', status: false, error: '后端服务未启动' });
      }
      
      // 显示结果
      const ul = document.getElementById('test-results');
      ul.innerHTML = results.map(r => {
        const className = r.status ? 'success' : 'error';
        const icon = r.status ? '✅' : '❌';
        const error = r.error ? ` (${r.error})` : '';
        return `<li class="${className}">${icon} ${r.name}${error}</li>`;
      }).join('');
    </script>
  </body>
</html>
